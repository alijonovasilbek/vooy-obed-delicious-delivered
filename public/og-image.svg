      <stop offset="0%" style="stop-color:#1a0a00"/>
      <stop offset="100%" style="stop-color:#2d1200"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Red accent bar left -->
  <rect x="0" y="0" width="8" height="630" fill="#ef1010"/>
  
  <!-- Logo circle -->
  <circle cx="160" cy="200" r="80" fill="white"/>
  <circle cx="160" cy="200" r="74" fill="white"/>
  <text x="160" y="185" text-anchor="middle" font-family="Arial Black" font-weight="900" font-size="28" fill="#1a1a1a">Vo<tspan fill="#ef1010">o</tspan>y</text>
  <rect x="110" y="196" width="100" height="28" rx="5" fill="#ef1010"/>
  <text x="160" y="215" text-anchor="middle" font-family="Arial Black" font-weight="900" font-size="18" fill="white">obed</text>

  <!-- Main title -->
  <text x="80" y="330" font-family="Arial Black" font-weight="900" font-size="88" fill="white">Tushlik</text>
  <text x="80" y="420" font-family="Arial Black" font-weight="900" font-size="88" fill="white">kerakmi?</text>

  <!-- Subtitle -->
  <text x="80" y="480" font-family="Arial" font-size="28" fill="#ffffff99">Har kuni yangi menyu • 100% Halol • Tez yetkazish</text>

