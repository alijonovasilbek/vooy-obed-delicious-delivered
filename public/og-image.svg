  <circle cx="950" cy="315" r="180" fill="#ef1010" opacity="0.1"/>
  <text x="950" y="350" text-anchor="middle" font-family="Arial" font-size="160">🍽️</text>

  <!-- URL bottom right -->
  <text x="1120" y="610" text-anchor="end" font-family="Arial" font-size="22" fill="#ffffff55">vooyobed.com</text>
